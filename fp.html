    // ======================= 14种幽默人设 (完整) =======================
    const PERSONALITIES = [
        { name: "🧨 甩锅艺术家", desc: "你的甩盘技术永远赶不上甩锅的速度。每次失误后‘我的我的’说得比谁都快，但下一手照样精准传给对手。队友私下叫你‘内鬼界的奥斯卡’，而你坚信自己只是运气不好。", vector: [3, 4, 2, 3, 7, 2] },
        { name: "🐢 养生散步流", desc: "别人在冲刺你在遛弯，别人在拼盘你在思考晚餐。你的无球跑动像极了公园里打太极的老大爷，防守漏人漏成筛子还觉得自己站位没问题。唯一优点是省电，打完整场手机还有80%电量。", vector: [2, 1, 1, 2, 2, 3] },
        { name: "🎭 假动作影帝", desc: "你的假动作永远能晃飞自己，对手还没动你先摔了个狗啃泥。场边回放能剪出五分钟搞笑集锦，堪称飞盘界的卓别林。你坚信‘只要我演得够真，就能骗过所有人’，包括你自己。", vector: [4, 5, 1, 3, 3, 2] },
        { name: "🔧 盘场老六", desc: "永远蹲在没人注意的角落等捡漏，一旦被盯上立刻隐身。进攻端查无此人，防守端逛街大师。偶尔偷一个盘能吹一整年，朋友圈封面就是那张截图。队友评价：‘有你是我们的福气（贬义）。’", vector: [3, 2, 2, 2, 5, 1] },
        { name: "💥 蛮牛冲撞", desc: "把飞盘玩成橄榄球，每次cut像拆迁队附体。对手怕你，队友更怕你——因为你会把所有人都撞飞，包括自己人。你坚信‘对抗是飞盘的一部分’，直到被裁判吹了第三次犯规。", vector: [2, 7, 8, 7, 1, 1] },
        { name: "🤯 战术过载", desc: "脑子里装了10086套战术，但手和脚完全跟不上。你比划的手势队友以为是外星密码，最后大家选择无视你。复盘时你能写三千字论文，上场后第一秒就开始梦游。", vector: [3, 2, 1, 2, 9, 3] },
        { name: "📉 反向核心", desc: "你的传盘精准度堪比导弹打蚊子——永远差十万八千里。每场稳定贡献5次直接出界+3次助攻对手，是对方当之无愧的最佳第六人。但你依然自信满满：‘下一盘绝对稳’。", vector: [1, 3, 2, 3, 2, 2] },
        { name: "☕ 气氛组组长", desc: "主要负责带零食、喊Nice和拍照发朋友圈。上场3分钟就叉腰喘气，防守全靠眼神。你的名言：‘我已经在精神上全力以赴了’。队友苦笑：‘有你真好（指零食）。’", vector: [1, 1, 1, 1, 1, 9] },
        { name: "🎢 过山车选手", desc: "状态全看老天爷心情。上一秒一条龙得分，下一秒黄油手连掉三个盘。你永远不知道自己下一分会是神是鬼，队友的心脏病快被你逼出来了。你安慰大家：‘这就是极限飞盘的魅力。’", vector: [5, 7, 4, 5, 4, 4] },
        { name: "🔮 玄学控盘", desc: "你的出盘轨迹违反空气动力学，弧线诡异到队友对手一起懵。没人知道你要传给谁，包括你自己。接你盘的人需要提前买意外险，而你称之为‘艺术飞盘’。", vector: [6, 3, 2, 3, 2, 2] },
        { name: "🗣️ 嘴炮王者", desc: "复盘时能写论文，上场就隐身。理论满分实战零分，最喜欢指导别人‘你应该怎么跑’，自己跑两步就喘。你的存在证明了一件事：飞盘智商和飞盘技术可以完全脱钩。", vector: [2, 1, 1, 2, 8, 4] },
        { name: "🍌 香蕉皮脚滑", desc: "你才是飞盘场上最大的危险源。关键分必定踩草皮、绊队友、脸刹滑铲。名场面制造机，盘圈博尔特——摔倒版。你的集锦比高光还长，每一帧都是表情包。", vector: [2, 2, 1, 2, 1, 3] },
        { name: "🧊 冰箱防守", desc: "你的防守比清晨的马路还宽敞，对手过你连假动作都懒得做。站桩式人形路障，唯一的防守贡献是占了一个名额。对手赛后感谢你：‘今天的热身很充分’。", vector: [1, 1, 1, 2, 1, 2] },
        { name: "📦 接盘恐惧症", desc: "大空位接到盘像接到炸弹，立刻用更烂的姿势甩出去。永远不敢持盘超过0.5秒，队友跑出机会你也看不见。你的信条：‘盘在手里超过一秒就是犯罪’。", vector: [2, 3, 1, 3, 1, 1] }
    ];

    // --- 全局变量 ---
    let userScores = [0,0,0,0,0,0];
    let answers = new Array(QUESTIONS.length).fill(null);
    let currentQuestionIdx = 0;
    let radarChartInstance = null;

    // DOM 元素
    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const shareBtn = document.getElementById('shareResultBtn');
    const questionTextSpan = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qCounterSpan = document.getElementById('qCounter');
    const qPercentSpan = document.getElementById('qPercent');
    const progressFill = document.getElementById('progressFill');
    const personalityNameSpan = document.getElementById('personalityName');
    const personalityDescSpan = document.getElementById('personalityDesc');
    const toastMsgDiv = document.getElementById('toastMsg');

    function showToast(msg, duration=1800) {
        toastMsgDiv.innerText = msg;
        toastMsgDiv.style.opacity = "1";
        setTimeout(() => toastMsgDiv.style.opacity = "0", duration);
    }

    function resetTest() {
        userScores = [0,0,0,0,0,0];
        answers = new Array(QUESTIONS.length).fill(null);
        currentQuestionIdx = 0;
        if (radarChartInstance) { radarChartInstance.destroy(); radarChartInstance = null; }
    }

    function recalcTotalScores() {
        userScores = [0,0,0,0,0,0];
        for (let i = 0; i < QUESTIONS.length; i++) {
            const optIdx = answers[i];
            if (optIdx !== null) {
                const optScores = QUESTIONS[i].options[optIdx].scores;
                for (let d = 0; d < DIMENSIONS.length; d++) userScores[d] += optScores[d];
            }
        }
    }

    function matchPersonality(rawScores) {
        const maxPossible = 12 * 3; // 每题最高3分，共12题（实际每题最高3，但题目共30题，总分范围0-90。为了归一化到0-10，分母用90）
        const totalMax = 30 * 3; // 30题每题最高3分 = 90
        const normalized = rawScores.map(v => (v / totalMax) * 10);
        let bestIdx = 0, minDist = Infinity;
        for (let i = 0; i < PERSONALITIES.length; i++) {
            const proto = PERSONALITIES[i].vector;
            let dist = 0;
            for (let d = 0; d < 6; d++) {
                const diff = normalized[d] - proto[d];
                dist += diff * diff;
            }
            dist = Math.sqrt(dist);
            if (dist < minDist) { minDist = dist; bestIdx = i; }
        }
        return { personality: PERSONALITIES[bestIdx], normalizedScores: normalized };
    }

    function renderRadarChart(normalizedScores) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (radarChartInstance) radarChartInstance.destroy();
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: DIM_NAMES_CN,
                datasets: [{
                    label: '你的飞盘能力值',
                    data: normalizedScores,
                    backgroundColor: 'rgba(194, 126, 46, 0.25)',
                    borderColor: '#c27e2e',
                    borderWidth: 2.5,
                    pointBackgroundColor: '#c27e2e',
                    pointBorderColor: '#fff',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: { r: { beginAtZero: true, max: 10, ticks: { stepSize: 2 }, grid: { color: '#e6cfb5' } } },
                plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)} 分` } } }
            }
        });
    }

    function showResult() {
        if (answers.some(a => a === null)) { showToast("还有题目没选完，别想逃！", 1500); return false; }
        recalcTotalScores();
        const { personality, normalizedScores } = matchPersonality(userScores);
        personalityNameSpan.innerText = personality.name;
        personalityDescSpan.innerText = personality.desc;
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        startScreen.classList.add('hidden');
        renderRadarChart(normalizedScores);
        return true;
    }

    function renderCurrentQuestion() {
        const q = QUESTIONS[currentQuestionIdx];
        questionTextSpan.innerText = q.text;
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const isSelected = (answers[currentQuestionIdx] === idx);
            const selectedClass = isSelected ? 'selected' : '';
            let iconHtml = '<i class="fas fa-dice-d6"></i>';
            if (idx === 0) iconHtml = '<i class="fas fa-hand-peace"></i>';
            if (idx === 1) iconHtml = '<i class="fas fa-bolt"></i>';
            if (idx === 2) iconHtml = '<i class="fas fa-shield-haltered"></i>';
            if (idx === 3) iconHtml = '<i class="fas fa-users"></i>';
            optionsHtml += `<div class="option-item ${selectedClass}" data-opt-index="${idx}">${iconHtml}<span>${opt.text}</span></div>`;
        });
        optionsContainer.innerHTML = optionsHtml;
        document.querySelectorAll('.option-item').forEach(el => {
            el.addEventListener('click', () => {
                const optIndex = parseInt(el.dataset.optIndex);
                answers[currentQuestionIdx] = optIndex;
                recalcTotalScores();
                renderCurrentQuestion();
            });
        });
        const answeredCount = answers.filter(a => a !== null).length;
        const percent = Math.floor((answeredCount / QUESTIONS.length) * 100);
        qCounterSpan.innerText = `第${currentQuestionIdx+1}/${QUESTIONS.length}题`;
        qPercentSpan.innerText = `${percent}%`;
        progressFill.style.width = `${percent}%`;
        prevBtn.disabled = (currentQuestionIdx === 0);
        if (currentQuestionIdx === QUESTIONS.length - 1) nextBtn.innerHTML = '✨ 揭晓结果 ✨';
        else nextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
    }

    function onNext() {
        if (answers[currentQuestionIdx] === null) { showToast("选一个呗，别纠结了！", 1000); return; }
        if (currentQuestionIdx === QUESTIONS.length - 1) {
            if (answers.every(a => a !== null)) showResult();
            else showToast(`还剩${answers.filter(a=>a===null).length}题，诚实点！`, 1200);
        } else { currentQuestionIdx++; renderCurrentQuestion(); }
    }
    function onPrev() { if (currentQuestionIdx > 0) { currentQuestionIdx--; renderCurrentQuestion(); } }
    function initTest() { resetTest(); renderCurrentQuestion(); startScreen.classList.add('hidden'); quizScreen.classList.remove('hidden'); resultScreen.classList.add('hidden'); }
    function retakeTest() { resetTest(); initTest(); }
    function shareResult() {
        const name = personalityNameSpan.innerText;
        const shortDesc = personalityDescSpan.innerText.slice(0, 80);
        const shareText = `🎭【飞盘人格测试】我是${name}！${shortDesc}... 你敢来测测自己的盘场真面目吗？`;
        if (navigator.clipboard) { navigator.clipboard.writeText(shareText).then(() => showToast("✅ 复制成功，快分享给盘友", 1500)).catch(() => showToast("手动复制也行啦", 1000)); }
        else {
            let ta = document.createElement('textarea'); ta.value = shareText; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast("📋 已复制，赶紧去祸害盘友", 1500);
        }
    }

    startBtn.addEventListener('click', initTest);
    nextBtn.addEventListener('click', onNext);
    prevBtn.addEventListener('click', onPrev);
    retakeBtn.addEventListener('click', retakeTest);
    shareBtn.addEventListener('click', shareResult);
</script>
