<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>飞盘人格测试 · 冷淡极端版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #eef2f0;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            color: #2c3e2f;
        }
        .container { max-width: 680px; margin: 0 auto; }
        .card {
            background: #fefcf8;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 28px 24px 36px;
            border: 1px solid #dadfce;
        }
        .hero-icon {
            background: #6f7c5f;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            opacity: 0.8;
        }
        .hero-icon i { font-size: 38px; color: white; }
        h1 {
            font-size: 1.9rem;
            font-weight: 500;
            text-align: center;
            color: #4a5b3e;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .sub {
            text-align: center;
            color: #8f9b82;
            font-weight: 400;
            margin-bottom: 28px;
            font-size: 0.85rem;
            border-bottom: 1px solid #e2e6d8;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }
        .desc {
            text-align: center;
            color: #6a785d;
            line-height: 1.5;
            margin: 20px 0 28px;
            font-size: 0.95rem;
            font-weight: 350;
        }
        .btn-start {
            background: #7f8c6e;
            border: none;
            color: white;
            font-weight: 400;
            font-size: 1.1rem;
            padding: 14px 20px;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-start:hover { background: #6a785d; }
        .progress-area { margin-bottom: 28px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 400; color: #8f9b82; margin-bottom: 6px; }
        .progress-bar-bg { background: #e2e6d8; border-radius: 20px; height: 6px; overflow: hidden; }
        .progress-fill { background: #7f8c6e; width: 0%; height: 100%; border-radius: 20px; transition: width 0.2s ease; }
        .question-text { font-size: 1.4rem; font-weight: 450; line-height: 1.3; margin: 12px 0 24px; color: #3e4d36; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0 32px; }
        .option-item {
            background: #ffffff;
            border: 1px solid #dee2d4;
            border-radius: 100px;
            padding: 12px 18px;
            font-weight: 400;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4e5f43;
        }
        .option-item i { width: 22px; color: #b3bfa1; font-size: 1rem; }
        .option-item.selected {
            background: #f0f3ea;
            border-color: #7f8c6e;
            color: #4a5b3e;
        }
        .option-item.selected i { color: #7f8c6e; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 15px; margin-top: 12px; }
        .nav-btn {
            background: #f0f2ea;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 400;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            color: #6a785d;
        }
        .nav-btn.primary { background: #7f8c6e; color: white; }
        .nav-btn:active { opacity: 0.7; }
        .result-badge { text-align: center; margin-bottom: 20px; }
        .personality-name { font-size: 1.8rem; font-weight: 450; color: #5b6e4a; margin: 8px 0; letter-spacing: -0.3px; }
        .personality-desc {
            background: #f5f7f0;
            padding: 18px 20px;
            border-radius: 28px;
            margin: 20px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #5b6b4e;
            border-left: 3px solid #b9c4a2;
        }
        .radar-container { margin: 20px 0; background: #ffffff; border-radius: 28px; padding: 8px; }
        canvas { max-height: 260px; width: 100%; }
        .share-btn, .retake-btn {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 400;
            font-size: 0.9rem;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            background: #eef2e6;
            color: #6a785d;
        }
        .retake-btn { background: #7f8c6e; color: white; }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4e5f43;
            color: #eef2e6;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 999;
            opacity: 0;
            transition: 0.15s;
            pointer-events: none;
        }
        footer { text-align: center; font-size: 0.65rem; color: #b1be9b; margin-top: 28px; }
        .hidden { display: none; }
        .cartoon-style {
            font-family: monospace;
            white-space: pre;
            font-size: 11px;
            line-height: 1.2;
            text-align: center;
            background: #fafcf5;
            padding: 12px 5px;
            border-radius: 24px;
            margin: 10px 0;
            color: #7d8b67;
        }
        @media (max-width: 480px) { .cartoon-style { font-size: 9px; } }
    </style>
</head>
<body>
<div class="container">
    <div id="startScreen" class="card">
        <div class="hero-icon"><i class="fas fa-frisbee"></i></div>
        <h1>飞盘人格测试</h1>
        <div style="text-align: center;"><span class="sub">极端选项 · 冷淡盘学</span></div>
        <div class="desc">
            30道题，选项比较极端。<br>
            选最像你的那个就行。不用想太多。
        </div>
        <button class="btn-start" id="startBtn">开始</button>
        <footer>结果也就那样，别太在意</footer>
    </div>

    <div id="quizScreen" class="card hidden">
        <div class="progress-area">
            <div class="progress-text"><span id="qCounter">第1题</span><span id="qPercent">0%</span></div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsContainer"></div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀ 上一题</button>
            <button class="nav-btn primary" id="nextBtn">下一题 ▶</button>
        </div>
    </div>

    <div id="resultScreen" class="card hidden">
        <div class="result-badge">
            <div id="cartoonContainer" class="cartoon-style"></div>
            <div class="personality-name" id="personalityName"></div>
            <div style="font-size:0.7rem; background:#f0f3ea; display: inline-block; padding: 3px 14px; border-radius: 30px;">大概就是这样</div>
        </div>
        <div class="personality-desc" id="personalityDesc"></div>
        <div class="radar-container">
            <canvas id="radarChart" width="400" height="260"></canvas>
        </div>
        <button class="share-btn" id="shareResultBtn">分享 · 也可以不分享</button>
        <button class="retake-btn" id="retakeBtn">重新测一次</button>
        <footer>冷淡提示：人生本就没什么意义</footer>
    </div>
</div>
<div id="toastMsg" class="toast-msg">已复制，随你便。</div>

<script>
    const DIMENSIONS = ["throw", "speed", "defense", "stamina", "tactics", "teamwork"];
    const DIM_NAMES_CN = ["投掷", "速度", "防守", "耐力", "战术", "团队"];

    // ========= 30题，每个选项分数拉开差距，极端化 (0-5分范围，突出差异) =========
    const QUESTIONS = [
        { text: "队友让你跑一个 deep cut，你一般会？", options: [
            { text: "全力冲刺，跑到接不到为止", scores: [0,5,0,2,1,1] },
            { text: "慢跑，反正也不一定传", scores: [0,1,0,0,0,0] },
            { text: "站在原地，懒得动", scores: [0,0,0,0,0,0] },
            { text: "跑一半停下来，假装被挡住了", scores: [0,2,0,0,0,1] }
        ]},
        { text: "你的反手盘是什么水平？", options: [
            { text: "完全没有，从不使用", scores: [0,0,0,0,0,0] },
            { text: "能传，但弧线像彩虹", scores: [2,0,0,0,0,0] },
            { text: "稳得一批，比正手还好", scores: [5,0,0,0,1,0] },
            { text: "时好时坏，完全看运气", scores: [1,0,0,0,0,0] }

        { text: "防守时被对手一步过掉，你的反应是？", options: [

            { text: "拼命回追，哪怕追到对面底线", scores: [0,2,4,2,0,1] },
            { text: "伸手拉一下衣服，但立刻松手", scores: [0,0,2,0,0,0] },
            { text: "目送得分，然后叹口气", scores: [0,0,0,0,0,0] }
        ]},
        { text: "比赛进行到下半场，你的体能状态？", options: [
            { text: "还能再打两小时", scores: [0,0,0,5,0,0] },
            { text: "已经走不动了，想躺下", scores: [0,0,0,0,0,0] },
            { text: "全靠意志力，腿已经不是自己的", scores: [0,0,0,3,0,1] },
            { text: "还行，但不想跑了", scores: [0,0,0,1,0,0] }
        ]},
        { text: "队友失误导致丢分，你的第一反应？", options: [
            { text: "没关系，下一分打回来", scores: [0,0,0,0,0,4] },
            { text: "忍不住叹气，但不说出来", scores: [0,0,0,0,0,0] },
            { text: "直接说'你怎么搞的'", scores: [0,0,0,0,0,0] },
            { text: "走开，不想说话", scores: [0,0,0,0,0,0] }
        ]},
        { text: "你觉得自己在队里的定位？", options: [
            { text: "核心，没我不行", scores: [2,2,2,2,2,2] },
            { text: "透明人，可有可无", scores: [0,0,0,0,0,0] },
            { text: "气氛组，负责喊nice", scores: [0,0,0,0,0,4] },
            { text: "苦力，干脏活累活", scores: [0,1,3,2,0,1] }
        ]},
        { text: "面对一个几乎不可能接到的长传，你会？", options: [
            { text: "全力冲刺，万一接到了呢", scores: [0,5,0,2,0,1] },
            { text: "象征性跑两步，然后放弃", scores: [0,1,0,0,0,0] },
            { text: "根本不跑，看都不看", scores: [0,0,0,0,0,0] },
            { text: "跑，但心里觉得接不到", scores: [0,2,0,0,0,0] }
        ]},
        { text: "你如何看待飞盘精神（SOTG）？", options: [
            { text: "很重要，严格遵守", scores: [0,0,0,0,0,5] },
            { text: "知道但不太在意", scores: [0,0,0,0,0,1] },
            { text: "无所谓，赢最重要", scores: [0,0,0,0,0,0] },
            { text: "有点烦，觉得太矫情", scores: [0,0,0,0,0,0] }

        { text: "你的无球跑动风格更像？", options: [
            { text: "永远在跑，但跑不出空位", scores: [0,3,0,2,0,1] },
            { text: "基本不跑，等盘来找我", scores: [0,0,0,0,0,0] },

            { text: "乱跑，队友都不知道我在哪", scores: [0,2,0,0,0,0] }

        { text: "队伍落后很多时，你的状态？", options: [

            { text: "防守硬", scores: [0,0,5,1,0,0] }
        ]},
        { text: "持盘超过5秒还没传出去，你会？", options: [
            { text: "冷静观察，找到最佳选择", scores: [2,0,0,0,4,1] },
            { text: "慌张出盘，大概率被断", scores: [0,0,0,0,0,0] },
            { text: "自己跑，然后被逼出界", scores: [0,2,0,0,0,0] },
            { text: "大喊'没人跑位'", scores: [0,0,0,0,0,1] }
        ]},
        { text: "别人对你做假动作，你通常？", options: [
            { text: "被晃飞，然后目送", scores: [0,0,0,0,0,0] },
            { text: "不吃晃，稳稳跟住", scores: [0,0,4,1,1,0] },
            { text: "伸手掏盘，赌一把", scores: [0,0,3,0,0,0] },
            { text: "懒得动，让他过", scores: [0,0,0,0,0,0] }
        ]},
        { text: "你的飞盘偶像是什么风格？", options: [
            { text: "控盘大师，靠脑子打球", scores: [1,0,0,0,5,0] },
            { text: "速度狂魔，跑位风骚", scores: [0,5,0,1,0,0] },
            { text: "防守悍将，让人难受", scores: [0,0,5,1,0,0] },
            { text: "全能战士，什么都行", scores: [2,2,2,2,2,2] }
        ]},
        { text: "被对手得分后，你的情绪？", options: [
            { text: "毫无波澜，反正比赛还长", scores: [0,0,0,0,0,0] },
            { text: "有点不爽，下次防回来", scores: [0,0,2,0,0,0] },
            { text: "很生气，但憋着不说", scores: [0,0,0,0,0,0] },
            { text: "无所谓，输赢正常", scores: [0,0,0,0,0,1] }
        ]},
        { text: "你的耐力在飞盘圈属于？", options: [
            { text: "铁人，全场不歇", scores: [0,0,0,5,0,0] },
            { text: "打一会就喘，需要轮换", scores: [0,0,0,1,0,0] },
            { text: "基本告别下半场", scores: [0,0,0,0,0,0] },
            { text: "够用，但不算突出", scores: [0,0,0,2,0,0] }
        ]},
        { text: "队友希望你多跑动，你会？", options: [
            { text: "哦，然后继续散步", scores: [0,0,0,0,0,0] },

            { text: "直接走开，不理", scores: [0,0,0,0,0,0] }

        { text: "你的启动速度大概是？", options: [

            { text: "可有可无", scores: [0,0,0,0,0,0] }

            { text: "更专注，想赢", scores: [0,2,2,1,2,1] },
            { text: "已经走神，想回家了", scores: [0,0,0,0,0,0] },
            { text: "无所谓，打完就行", scores: [0,0,0,0,0,0] },
            { text: "尽力打完最后几分", scores: [0,1,1,1,1,1] }
        ]},
        { text: "你觉得自己是一个有激情的飞盘手吗？", options: [
            { text: "非常有激情，全场最high", scores: [0,2,1,1,0,4] },
            { text: "没什么激情，比较冷淡", scores: [0,0,0,0,0,0] },
            { text: "看心情，状态好就激情", scores: [0,1,0,0,0,2] },
            { text: "激情不如躺着", scores: [0,0,0,0,0,0] }
        ]}
    ];

    // 14种人格 + 冷淡描述 + 专属卡通（ASCII）
    const PERSONALITIES = [
        { name: "🌿 散步型选手", desc: "你在场上移动的速度，和公园里看手机的人差不多。不是不想跑，是觉得没必要。队友喊你，你听到了，但脚步没有加快。", vector: [2,1,1,2,1,3], ascii: "   🚶\n  / 🥏\n /   \\\n(慢悠悠)" },
        { name: "🫥 透明人", desc: "存在感约等于零。没人记得你上局在哪个队，甚至你自己也不太确定。接盘不多，失误也不多，就像背景里的那棵树。", vector: [1,1,1,1,1,1], ascii: "   👤\n  /   \\\n  _ _\n(谁？)" },
        { name: "🧻 甩锅惯犯", desc: "失误后那句'我的'说得很流畅，但下一盘依然会传给对手。不是故意的，只是恰好每次都这样。", vector: [3,2,2,2,5,2], ascii: "   👐\n  /🎭\\\n  ‾‾\n(不关我事)" },
        { name: "🪨 防守石墩", desc: "你的防守动作和路边的石墩差不多——一动不动。对手过你的时候甚至不需要变向。", vector: [1,1,2,1,1,1], ascii: "   🪨\n  /   \\\n  ‾‾\n(别指望)" },
        { name: "📦 接盘恐惧症", desc: "接到盘就像接到烫手山芋，恨不得立刻扔出去。方向准不准不重要，重要的是不在自己手里。", vector: [2,2,1,2,1,2], ascii: "   📦\n  / 😨\n /  🥏\n(快拿走)" },
        { name: "🥱 节能模式", desc: "你是场上最省电的人。能走绝不跑，能看绝不追。赛后别人在复盘，你在想晚饭吃什么。", vector: [1,1,1,2,1,2], ascii: "   😴\n  / 🥏\n /   \\\n(懒得动)" },
        { name: "🔮 随缘传盘", desc: "你的传盘方向由宇宙决定。队友不知道你要传给谁，对手也不知道，可能你自己也不知道。", vector: [3,2,1,2,2,2], ascii: "   🔮\n  / 🥏\n /   \\\n(看缘分)" },
        { name: "🍂 秋风格局", desc: "你的跑动路线和落叶一样随机。跑了很多，但没什么意义。队友看着你，欲言又止。", vector: [1,2,1,2,1,2], ascii: "   🍂\n  / 🥏\n /   \\\n(飘忽)" },
        { name: "🧠 战术纸上谈兵", desc: "你在场下分析得头头是道，上场后全部忘光。理论满分，实践零分，你自己也知道。", vector: [2,1,1,1,6,3], ascii: "   📖\n  / 🤓\n /   \\\n(只是说说)" },
        { name: "💨 三秒爆发", desc: "你的速度只能维持三秒，然后就泄气了。像一阵风，吹过就没了。对手甚至没注意到你。", vector: [1,4,1,1,1,1], ascii: "   💨\n  / 🥏\n /   \\\n(没了)" },
        { name: "☕ 气氛组成员", desc: "你的主要贡献是带零食和喊nice。上场时间不多，但零食很好吃。大家对你没有太多期待。", vector: [1,1,1,1,1,7], ascii: "   ☕\n  / 🍪\n /   \\\n(好吃就行)" },
        { name: "🎢 过山车体验者", desc: "你的状态起伏不定，有时候像高手，有时候像新手。你自己也不知道下一秒会是什么样。", vector: [4,4,3,3,3,3], ascii: "   🎢\n  / 😵\n /   \\\n(随缘)" },
        { name: "🧊 冷感防守", desc: "你的防守不叫防守，叫目送。对手得分后你会轻轻点一下头，表示你看到了。", vector: [1,1,1,2,1,2], ascii: "   🧊\n  / 🥏\n /   \\\n(冻住了)" },
        { name: "📉 反向贡献者", desc: "你上场后对方的胜率反而提高了。不是故意的，但事情就是这样发生的。", vector: [1,2,1,2,1,1], ascii: "   📉\n  / 🥏\n /   \\\n(不好意思)" }
    ];

    let userScores = [0,0,0,0,0,0];
    let answers = new Array(QUESTIONS.length).fill(null);
    let currentQuestionIdx = 0;
    let radarChartInstance = null;

    // DOM elements
    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const shareBtn = document.getElementById('shareResultBtn');
    const questionTextSpan = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qCounterSpan = document.getElementById('qCounter');
    const qPercentSpan = document.getElementById('qPercent');
    const progressFill = document.getElementById('progressFill');
    const personalityNameSpan = document.getElementById('personalityName');
    const personalityDescSpan = document.getElementById('personalityDesc');
    const cartoonContainer = document.getElementById('cartoonContainer');
    const toastMsgDiv = document.getElementById('toastMsg');

    function showToast(msg) { toastMsgDiv.innerText = msg; toastMsgDiv.style.opacity = "1"; setTimeout(() => toastMsgDiv.style.opacity = "0", 1500); }

    function reset() { userScores = [0,0,0,0,0,0]; answers.fill(null); currentQuestionIdx = 0; if(radarChartInstance) radarChartInstance.destroy(); }
    function recalc() { userScores = [0,0,0,0,0,0]; for(let i=0;i<QUESTIONS.length;i++){ let o=answers[i]; if(o!==null){ let s=QUESTIONS[i].options[o].scores; for(let d=0;d<6;d++) userScores[d]+=s[d]; } } }
    function matchPersonality(raw){
        let totalMax=30*5; let norm=raw.map(v=>(v/totalMax)*10);
        let best=0, minD=Infinity;
        for(let i=0;i<PERSONALITIES.length;i++){
            let pv=PERSONALITIES[i].vector; let d=0;
            for(let j=0;j<6;j++) d+=(norm[j]-pv[j])**2;
            d=Math.sqrt(d); if(d<minD){ minD=d; best=i; }
        } return { personality:PERSONALITIES[best], normScores:norm };
    }
    function renderRadar(norm){
        let ctx=document.getElementById('radarChart').getContext('2d');
        if(radarChartInstance) radarChartInstance.destroy();
        radarChartInstance=new Chart(ctx,{ type:'radar', data:{ labels:DIM_NAMES_CN, datasets:[{ label:'大概的水平', data:norm, backgroundColor:'rgba(127,140,110,0.2)', borderColor:'#7f8c6e', borderWidth:1.5, pointBackgroundColor:'#7f8c6e', pointRadius:3 }] }, options:{ responsive:true, maintainAspectRatio:true, scales:{ r:{ beginAtZero:true, max:10, ticks:{ stepSize:2 }, grid:{ color:'#dee2d4' } } }, plugins:{ tooltip:{ callbacks:{ label:(ctx)=>`${ctx.label}: ${ctx.raw.toFixed(1)}` } } } } });
    }
    function showResult(){
        if(answers.some(a=>a===null)){ showToast("还有题没选，随便选完再来。"); return false; }
        recalc(); let {personality,normScores}=matchPersonality(userScores);
        personalityNameSpan.innerText=personality.name;
        personalityDescSpan.innerText=personality.desc;
        cartoonContainer.innerHTML=`<pre style="font-family: monospace; margin:0;">${personality.ascii}</pre>`;
        quizScreen.classList.add('hidden'); resultScreen.classList.remove('hidden'); startScreen.classList.add('hidden');
        renderRadar(normScores); return true;
    }
    function renderCurrent(){
        let q=QUESTIONS[currentQuestionIdx];
        questionTextSpan.innerText=q.text;
        let html='';
        q.options.forEach((opt,idx)=>{
            let sel=answers[currentQuestionIdx]===idx?'selected':'';
            let icon='<i class="fas fa-minus-circle"></i>';
            if(idx===0) icon='<i class="fas fa-leaf"></i>';
            if(idx===1) icon='<i class="fas fa-cloud"></i>';
            if(idx===2) icon='<i class="fas fa-water"></i>';
            if(idx===3) icon='<i class="fas fa-moon"></i>';
            html+=`<div class="option-item ${sel}" data-opt="${idx}">${icon}<span>${opt.text}</span></div>`;
        });
        optionsContainer.innerHTML=html;
        document.querySelectorAll('.option-item').forEach(el=>{ el.addEventListener('click',()=>{ let v=parseInt(el.dataset.opt); answers[currentQuestionIdx]=v; recalc(); renderCurrent(); }); });
        let done=answers.filter(a=>a!==null).length;
        let pct=Math.floor(done/QUESTIONS.length*100);
        qCounterSpan.innerText=`第${currentQuestionIdx+1}/${QUESTIONS.length}题`;
        qPercentSpan.innerText=`${pct}%`;
        progressFill.style.width=`${pct}%`;
        prevBtn.disabled=(currentQuestionIdx===0);
        if(currentQuestionIdx===QUESTIONS.length-1) nextBtn.innerHTML='结果 ▶';
        else nextBtn.innerHTML='下一题 ▶';
    }
    function next(){
        if(answers[currentQuestionIdx]===null){ showToast("选一个吧，反正也没什么意义。"); return; }
        if(currentQuestionIdx===QUESTIONS.length-1){ if(answers.every(a=>a!==null)) showResult(); else showToast("还有空的。"); }
        else{ currentQuestionIdx++; renderCurrent(); }
    }
    function prev(){ if(currentQuestionIdx>0){ currentQuestionIdx--; renderCurrent(); } }
    function init(){ reset(); renderCurrent(); startScreen.classList.add('hidden'); quizScreen.classList.remove('hidden'); resultScreen.classList.add('hidden'); }
    function retakeTest(){ reset(); init(); }
    function shareRes(){
        let name=personalityNameSpan.innerText;
        let descShort=personalityDescSpan.innerText.slice(0,60);
        let text=`【冷淡飞盘测试】我是${name}。${descShort}。随便测测，不必在意。`;
        if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast("复制了。就这样吧。")).catch(()=>showToast("复制失败，无所谓。"));
        else{ let ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast("复制了。"); }
    }
    startBtn.addEventListener('click',init);
    nextBtn.addEventListener('click',next);
    prevBtn.addEventListener('click',prev);
    retakeBtn.addEventListener('click',retakeTest);
    shareBtn.addEventListener('click',shareRes);
</script>
</body>
</html>
